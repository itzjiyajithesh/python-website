{% extends "base.html" %}

{% block content %}

<div class="box">

<h1>Make Your Own Story</h1>

<form method="POST">

<textarea name="content" rows="6"></textarea>

<button>Save Story</button>

</form>

<h2>Your Stories</h2>

{% for s in stories %}
<p>{{s[0]}}</p>
{% endfor %}

</div>

{% endblock %}
